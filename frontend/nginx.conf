# Redirect HTTP to HTTPS, but allow certbot ACME challenges through
server {
  listen 80;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type text/plain;
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS
server {
  listen 443 ssl;
  server_name _;

  ssl_certificate     /etc/ssl/app/fullchain.pem;
  ssl_certificate_key /etc/ssl/app/privkey.pem;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to the backend container
  location /api/ {
    proxy_pass http://backend:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Allow large zip uploads — matches the backend ADMIN_MAX_ZIP_BYTES limit.
    client_max_body_size 500m;
    proxy_read_timeout   300s;
    proxy_send_timeout   300s;
  }

  # SPA routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }
}
