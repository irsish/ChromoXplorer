# Dev server overrides — adds SSL certs for dev.chromoxplorer.org and port 443.
# Used by GH Actions: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
services:
  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt/live/dev.chromoxplorer.org/fullchain.pem:/etc/ssl/app/fullchain.pem:ro
      - /etc/letsencrypt/live/dev.chromoxplorer.org/privkey.pem:/etc/ssl/app/privkey.pem:ro
