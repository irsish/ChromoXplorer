services:
  mongodb:
    image: mongo:8
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"   # exposed so MongoDB Compass can connect from the host
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      # passed through so mongo-init.sh can create the backend user
      MONGO_BACKEND_USER: ${MONGO_BACKEND_USER}
      MONGO_BACKEND_PASSWORD: ${MONGO_BACKEND_PASSWORD}
    volumes:
      - db-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

  backend:
    build:
      context: ./backend
    container_name: backend
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MONGODB_URI: ${MONGODB_URI}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "3000:3000"
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
        VITE_COGNITO_AUTHORITY: ${VITE_COGNITO_AUTHORITY}
        VITE_COGNITO_CLIENT_ID: ${VITE_COGNITO_CLIENT_ID}
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
